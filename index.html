<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="calculator ">
        <div class="container1 ">
            <div class="display">0</div>
        </div>
        <div class="container2">
            <button class="btn btn-secondary " id="clear">C</button>
            <button class="btn btn-secondary" id="backspace">⌫</button>
            <button class="btn  operator_btn" id="divide">÷</button>
            <button class="btn operator_btn" id="multiply">x</button>
            <button class="btn number_btn" id="seven">7</button>
            <button class="btn number_btn" id="eight">8</button>
            <button class="btn number_btn" id="nine">9</button>
            <button class="btn operator_btn" id="subtract">-</button>
            <button class="btn number_btn" id="four">4</button>
            <button class="btn number_btn" id="five">5</button>
            <button class="btn number_btn" id="six">6</button>
            <button class="btn operator_btn" id="add">+</button>
            <button class="btn number_btn" id="one">1</button>
            <button class="btn number_btn" id="two">2</button>
            <button class="btn number_btn" id="three">3</button>
            <button class="btn number_btn" id="zero">0</button>
            <button class="btn number_btn" id="decimal">.</button>
            <button class="btn number_btn" id="percent">%</button>
            <button class="btn btn-primary" id="equals">=</button>
        </div>
    </div>
    <script src="./bootstrap.bundle.min.js"></script>
    <script src="./index.js"></script>
</body>

</html>
